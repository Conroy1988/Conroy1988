    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b6cf6" stop-opacity="0.19"/>
      <stop offset="1" stop-color="#7b6cf6" stop-opacity="0.035"/>
