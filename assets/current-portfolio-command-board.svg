      <stop offset="0.52" stop-color="#0b1423"/>
      <stop offset="1" stop-color="#171026"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#45e0ef"/>
      <stop offset="0.5" stop-color="#7b6cf6"/>
      <stop offset="1" stop-color="#d866ef"/>
    </linearGradient>
    <linearGradient id="public" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#45e0ef" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#45e0ef" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="private" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7b6cf6" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#7b6cf6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="tkb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#d866ef" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#d866ef" stop-opacity="0.04"/>
