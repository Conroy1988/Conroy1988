      <stop offset="0" stop-color="#22d3a6" stop-opacity="0.17"/>
      <stop offset="1" stop-color="#22d3a6" stop-opacity="0.04"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.025"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#d8f5ff" stroke-opacity="0.032"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
