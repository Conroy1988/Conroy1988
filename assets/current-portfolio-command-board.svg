<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Conroy1988 six-system portfolio command board</title>
  <desc id="desc">Six first-party systems across public products, knowledge and research platforms, private operations, market intelligence and a persistent game, plus Team Killing Bastards leadership and scoped contribution work.</desc>
  <defs>
