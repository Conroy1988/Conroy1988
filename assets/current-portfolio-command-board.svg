<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">Conroy1988 current technical portfolio command board</title>
  <desc id="desc">A visual overview of Conroy1988 public products, private systems, Team Killing Bastards leadership and open-source contribution work.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
