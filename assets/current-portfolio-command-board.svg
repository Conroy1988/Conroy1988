  <text x="848" y="864" fill="#9eacbe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14">Contribute where useful. Preserve creator authority. Verify the live result.</text>
  <rect x="848" y="892" width="302" height="72" rx="16" fill="#0d1b1d" stroke="#22d3a6" stroke-opacity="0.24"/>
  <text x="868" y="920" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="820">Command Nexus iOS</text>
  <text x="868" y="945" fill="#9eacbe" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">Initiated and implemented with permission</text>
  <rect x="1172" y="892" width="322" height="72" rx="16" fill="#0e1522" stroke="#45e0ef" stroke-opacity="0.24"/>
