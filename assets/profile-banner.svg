    <text x="43" y="30" fill="#edf3fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="750" letter-spacing="1.2">BUILD</text>

    <rect x="192" width="188" height="48" rx="24" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle cx="217" cy="24" r="5" fill="#7970f6"/>
    <text x="235" y="30" fill="#edf3fa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="14" font-weight="750" letter-spacing="1.2">OPERATE</text>

