<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">Conroy — systems builder and project operator</title>
  <desc id="desc">A dark technical banner representing operational software, automation, research platforms, game systems and community infrastructure.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070b14"/>
      <stop offset="0.48" stop-color="#0d1727"/>
      <stop offset="1" stop-color="#171126"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#65e6f5"/>
      <stop offset="0.48" stop-color="#7970f6"/>
      <stop offset="1" stop-color="#d06bf0"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.025"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#b5eaff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="30" fill="url(#background)"/>
  <rect width="1600" height="520" rx="30" fill="url(#grid)"/>
  <rect x="1" y="1" width="1598" height="518" rx="29" fill="none" stroke="#ffffff" stroke-opacity="0.10"/>

  <circle cx="1270" cy="72" r="170" fill="#665bf0" opacity="0.12" filter="url(#glow)"/>
  <circle cx="1470" cy="430" r="190" fill="#d06bf0" opacity="0.09" filter="url(#glow)"/>
  <circle cx="130" cy="500" r="130" fill="#65e6f5" opacity="0.07" filter="url(#glow)"/>

  <g transform="translate(74 70)">
    <rect width="76" height="76" rx="19" fill="url(#panel)" stroke="#ffffff" stroke-opacity="0.13"/>
    <path d="M20 24h36v8H43v25H33V32H20z" fill="url(#accent)"/>
    <path d="M20 49h36v8H20z" fill="#ffffff" opacity="0.92"/>
  </g>

  <text x="176" y="97" fill="#93a2b8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" letter-spacing="3.8">SYSTEMS BUILDER · EDINBURGH, SCOTLAND</text>
  <text x="72" y="207" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="86" font-weight="850" letter-spacing="-3">CONROY</text>
  <rect x="74" y="232" width="700" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="74" y="284" fill="#d2d9e4" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="25" font-weight="600">Turning operational friction into dependable digital systems.</text>
  <text x="74" y="324" fill="#9caabd" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="19">Browser tooling · Automation · Research platforms · Game systems · Self-hosting</text>

