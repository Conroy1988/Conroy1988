      <circle cx="29" cy="29" r="7" fill="#d06bf0"/>
      <text x="50" y="25" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="750">UK FIRE COMMAND</text>
      <text x="50" y="44" fill="#8797aa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">PERSISTENT EMERGENCY-SERVICE GAME</text>
    </g>

    <g transform="translate(34 292)">
      <rect width="482" height="58" rx="14" fill="#101723" stroke="#ffffff" stroke-opacity="0.14"/>
      <circle cx="29" cy="29" r="7" fill="#b7c2d1"/>
      <text x="50" y="25" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="750">TEAM KILLING BASTARDS</text>
      <text x="50" y="44" fill="#8797aa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">COMMUNITY SOFTWARE &amp; INFRASTRUCTURE</text>
