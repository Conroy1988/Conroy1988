<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="600" viewBox="0 0 1600 600" role="img" aria-labelledby="title desc">
  <title id="title">Conroy — operational systems builder and Team Killing Bastards founder</title>
  <desc id="desc">A dark technical profile banner presenting six first-party systems, Team Killing Bastards leadership and operations-led software development.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#040811"/>
      <stop offset="0.52" stop-color="#091625"/>
      <stop offset="1" stop-color="#180d25"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#45e0ef"/>
      <stop offset="0.5" stop-color="#7b6cf6"/>
      <stop offset="1" stop-color="#d866ef"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.095"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.025"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#d8f5ff" stroke-opacity="0.033"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
  </defs>

  <rect width="1600" height="600" rx="34" fill="url(#bg)"/>
  <rect width="1600" height="600" rx="34" fill="url(#grid)"/>
  <rect x="1" y="1" width="1598" height="598" rx="33" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>

  <circle cx="1390" cy="60" r="220" fill="#7b6cf6" opacity="0.12" filter="url(#glow)"/>
  <circle cx="1540" cy="530" r="190" fill="#d866ef" opacity="0.09" filter="url(#glow)"/>
  <circle cx="40" cy="600" r="170" fill="#45e0ef" opacity="0.08" filter="url(#glow)"/>

  <g transform="translate(68 58)">
    <rect width="76" height="76" rx="21" fill="url(#glass)" stroke="#ffffff" stroke-opacity="0.16"/>
    <path d="M18 21h40v9H44v28H32V30H18z" fill="url(#accent)"/>
    <path d="M18 49h40v9H18z" fill="#ffffff" opacity="0.94"/>
  </g>

  <text x="168" y="86" fill="#97a6ba" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="750" letter-spacing="3.4">OPERATIONS-LED SOFTWARE · EDINBURGH, SCOTLAND</text>
  <text x="68" y="210" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="92" font-weight="850" letter-spacing="-4">CONROY</text>
  <rect x="70" y="236" width="690" height="5" rx="2.5" fill="url(#accent)"/>
  <text x="70" y="288" fill="#d7dee8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="650">I turn operational friction into dependable digital systems.</text>
  <text x="70" y="329" fill="#96a4b7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="17">Command intelligence · Automation · Research · Games · Infrastructure</text>

  <g transform="translate(70 372)">
    <rect width="182" height="52" rx="26" fill="url(#glass)" stroke="#45e0ef" stroke-opacity="0.30"/>
    <circle cx="27" cy="26" r="6" fill="#45e0ef"/>
    <text x="47" y="32" fill="#f2f6fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="1.3">BUILD</text>

    <rect x="198" width="190" height="52" rx="26" fill="url(#glass)" stroke="#7b6cf6" stroke-opacity="0.32"/>
    <circle cx="225" cy="26" r="6" fill="#7b6cf6"/>
    <text x="245" y="32" fill="#f2f6fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="1.3">OPERATE</text>

    <rect x="404" width="196" height="52" rx="26" fill="url(#glass)" stroke="#d866ef" stroke-opacity="0.32"/>
    <circle cx="431" cy="26" r="6" fill="#d866ef"/>
    <text x="451" y="32" fill="#f2f6fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="13" font-weight="800" letter-spacing="1.3">IMPROVE</text>
