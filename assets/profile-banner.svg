      <text x="45" y="34" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">MAP COMMAND TOOLKIT</text>
      <text x="22" y="67" fill="#8ff4ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800">VERIFIED v4.20.35</text>
      <text x="22" y="91" fill="#8394a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Mission command · Fleet · Finance</text>

      <rect x="320" width="300" height="116" rx="18" fill="#0d1728" stroke="#5ebcff" stroke-opacity="0.42"/>
      <circle cx="345" cy="29" r="7" fill="#5ebcff"/>
      <text x="365" y="34" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">MISSIONCHIEF UK</text>
      <text x="342" y="67" fill="#9bdcff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800">v1.0.1 · 137 ENTITIES</text>
      <text x="342" y="91" fill="#8394a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Command search · Planning · API</text>
    </g>

    <g transform="translate(30 196)">
      <rect width="300" height="116" rx="18" fill="#17101f" stroke="#d866ef" stroke-opacity="0.38"/>
      <circle cx="25" cy="29" r="7" fill="#d866ef"/>
      <text x="45" y="34" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">ACHIEVEMENT ENCYCLOPEDIA</text>
      <text x="22" y="67" fill="#f3b0fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800">100/100 REPOSITORY HEALTH</text>
      <text x="22" y="91" fill="#8394a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Evidence · Guides · Static API</text>

      <rect x="320" width="300" height="116" rx="18" fill="#17101f" stroke="#d866ef" stroke-opacity="0.38"/>
      <circle cx="345" cy="29" r="7" fill="#d866ef"/>
      <text x="365" y="34" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">TKB DISCORD BOT</text>
      <text x="342" y="67" fill="#f3b0fb" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800">COMMAND · MONITOR · GITHUB</text>
      <text x="342" y="91" fill="#8394a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Community · Infrastructure · Recovery</text>
    </g>

    <g transform="translate(30 326)">
      <rect width="300" height="116" rx="18" fill="#0c1820" stroke="#22d3a6" stroke-opacity="0.38"/>
      <circle cx="25" cy="29" r="7" fill="#22d3a6"/>
      <text x="45" y="34" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">INVESTOR MATRIX</text>
      <text x="22" y="67" fill="#79f0d0" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800">PRIVATE · PHASE 0</text>
      <text x="22" y="91" fill="#8394a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Risk control · Auth · Recovery</text>

      <rect x="320" width="300" height="116" rx="18" fill="#121229" stroke="#7b6cf6" stroke-opacity="0.38"/>
      <circle cx="345" cy="29" r="7" fill="#7b6cf6"/>
      <text x="365" y="34" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="15" font-weight="800">UK FIRE COMMAND</text>
      <text x="342" y="67" fill="#bbb4ff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="800">PERSISTENT GAME SYSTEM</text>
      <text x="342" y="91" fill="#8394a7" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11">Scotland · England · Live routing</text>
