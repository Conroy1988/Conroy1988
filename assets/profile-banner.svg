    <rect x="30" y="466" width="620" height="2" rx="1" fill="url(#accent)" opacity="0.75"/>
    <text x="340" y="492" text-anchor="middle" fill="#aeb9c8" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="11" font-weight="700" letter-spacing="1.25">BUILD USEFUL SYSTEMS · OPERATE SERIOUSLY · IMPROVE WITH EVIDENCE</text>
