      <text x="50" y="44" fill="#8797aa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">OPERATIONAL BROWSER PLATFORM</text>
    </g>

    <g transform="translate(34 148)">
      <rect width="482" height="58" rx="14" fill="#111126" stroke="#7970f6" stroke-opacity="0.34"/>
      <circle cx="29" cy="29" r="7" fill="#7970f6"/>
      <text x="50" y="25" fill="#ffffff" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="16" font-weight="750">GITHUB ACHIEVEMENT ENCYCLOPEDIA</text>
      <text x="50" y="44" fill="#8797aa" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="12">EVIDENCE-LED RESEARCH PLATFORM</text>
